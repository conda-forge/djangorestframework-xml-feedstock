{% set version = "2.0.0" %}

package:
  name: djangorestframework-xml
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/d/djangorestframework-xml/djangorestframework-xml-{{ version }}.tar.gz
  sha256: 35f6c811d0ab8c8466b26db234e16a2ed32d76381715257aebf4c7be2c202ca1

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - defusedxml >=0.3

test:
  requires:
    - python {{ python_min }}
  imports:
    - rest_framework_xml

about:
  home: https://github.com/jpadilla/django-rest-framework-xml
  license: BSD-3-Clause
  license_file: LICENSE
  summary: XML support for Django REST Framework

extra:
  recipe-maintainers:
    - ocefpaf
